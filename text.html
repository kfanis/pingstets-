<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор соединения</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; min-width: 250px; }
        .stat { margin: 15px 0; }
        .label { font-size: 0.9em; color: #aaa; text-transform: uppercase; }
        .value { font-size: 2em; font-weight: bold; display: block; }
        .status-online { color: #4caf50; }
        .status-offline { color: #f44336; }
        #ping-value { color: #00bcd4; }
    </style>
</head>
<body>

<div class="card">
    <div class="stat">
        <span class="label">Статус</span>
        <span id="status" class="value">Проверка...</span>
    </div>
    <div class="stat">
        <span class="label">Пинг (RTT)</span>
        <span id="ping-value" class="value">0 ms</span>
    </div>
</div>

<script>
    const pingDisplay = document.getElementById('ping-value');
    const statusDisplay = document.getElementById('status');

    // Функция замера пинга
    async function checkNetwork() {
        const start = performance.now();
        
        try {
            // Используем fetch к текущему домену (или любому быстрому API)
            // 'cache: "no-store"' критически важен для точности
            await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
            
            const end = performance.now();
            const rtt = Math.round(end - start);

            // Обновляем интерфейс
            pingDisplay.textContent = `${rtt} ms`;
            statusDisplay.textContent = "В СЕТИ";
            statusDisplay.className = "value status-online";

        } catch (error) {
            pingDisplay.textContent = "--";
            statusDisplay.textContent = "ОФФЛАЙН";
            statusDisplay.className = "value status-offline";
        }
    }

    // Запускаем цикл проверки каждые 3 секунды
    setInterval(checkNetwork, 3000);
    checkNetwork(); // Первый запуск сразу
</script>

</body>
</html>
